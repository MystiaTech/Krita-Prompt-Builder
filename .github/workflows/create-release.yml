name: Create Release ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  create-release-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release ZIP
        run: |
          # Create the ZIP file with correct structure for Krita plugin import
          # The .desktop file and prompt_builder/ folder must be at the root of the ZIP
          # so they extract directly into pykrita/ when imported into Krita
          zip -r krita-prompt-builder.zip prompt_builder.desktop prompt_builder/

          # Verify the ZIP was created and has correct structure
          ls -lh krita-prompt-builder.zip
          unzip -l krita-prompt-builder.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: krita-prompt-builder.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact for manual runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: krita-prompt-builder
          path: krita-prompt-builder.zip
